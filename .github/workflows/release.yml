name: Release Artifacts

on:
  release:
    types: [published]

jobs:
  publish-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Build Docker artifacts image
        run: docker build --target artifacts -t cront-addon-artifacts:latest .

      - name: Extract artifacts from image
        shell: bash
        run: |
          set -euo pipefail
          cid=$(docker create cront-addon-artifacts:latest)
          mkdir -p artifact-out
          docker cp "$cid:/out/packages" ./artifact-out/packages
          docker rm "$cid"

      - name: Attach .mcaddon to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: artifact-out/packages/**/*.mcaddon
          fail_on_unmatched_files: true
